name: plantcare

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: plantcare
      POSTGRES_USER: plantcare
      POSTGRES_PASSWORD: plantcare
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantcare -d plantcare"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DJANGO_SECRET_KEY: dev-docker-plantcare-secret-key-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,testserver
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      JWT_COOKIE_SECURE: "0"
      JWT_COOKIE_SAMESITE: Lax
      POSTGRES_DB: plantcare
      POSTGRES_USER: plantcare
      POSTGRES_PASSWORD: plantcare
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
