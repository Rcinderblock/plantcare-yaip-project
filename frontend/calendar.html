<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Календарь ухода — PlantCare</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260610-12" />
  </head>
  <body data-page="calendar">
    <header class="topbar">
      <a class="brand" href="/index.html" data-nav="home" aria-label="PlantCare">
        <span class="brand-mark">P</span>
        <span>PlantCare</span>
      </a>
      <nav class="nav" aria-label="Основная навигация">
        <a href="/catalog.html" data-nav="catalog">Каталог</a>
        <a href="/guide.html" data-nav="guide">Справка</a>
        <a href="/plants.html" data-nav="plants">Мой сад</a>
        <a href="/calendar.html" data-nav="calendar">Календарь</a>
        <a href="/profile.html" data-nav="profile">Профиль</a>
      </nav>
      <div class="session">
        <span id="session-label">Проверяем сессию...</span>
        <button class="button small" id="logout-button" hidden>Выйти</button>
        <button class="button small primary" id="login-open-button">Войти</button>
      </div>
    </header>

    <main class="container">
      <div class="section-title">
        <div>
          <p class="eyebrow">Планирование</p>
          <h1>Календарь ухода</h1>
          <p class="section-description">Создавайте задачи и отмечайте выполненный уход за растениями.</p>
        </div>
      </div>

      <form class="panel form-grid" id="task-form">
        <label>
          Растение
          <select name="plant" required></select>
        </label>
        <label>
          Тип
          <select name="task_type">
            <option value="water">Полив</option>
            <option value="fertilize">Удобрение</option>
            <option value="repot">Пересадка</option>
            <option value="prune">Обрезка</option>
          </select>
        </label>
        <label>
          Дата
          <input name="due_date" type="date" required />
        </label>
        <label class="wide">
          Заметки
          <textarea name="notes" maxlength="1000" rows="2"></textarea>
        </label>
        <button class="button primary" type="submit">Добавить задачу</button>
      </form>
      <p class="message" id="calendar-message"></p>
      <div class="list" id="tasks-list"></div>
    </main>

    <script src="/assets/app.js?v=20260610-12"></script>
  </body>
</html>
